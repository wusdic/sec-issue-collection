<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>国内行业安全事件库 · 管理后台</title>
<style>
  :root{--bg:#0f172a;--panel:#fff;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;
        --ok:#16a34a;--warn:#d97706;--bad:#dc2626;--soft:#f1f5f9;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;
       background:#f8fafc;color:#0f172a;font-size:14px}
  a{color:var(--brand);text-decoration:none}
  /* 登录 */
  #login{max-width:360px;margin:12vh auto;background:#fff;padding:32px;border-radius:14px;
         box-shadow:0 10px 40px rgba(2,6,23,.12)}
  #login h1{font-size:18px;margin:0 0 4px} #login p{color:var(--muted);margin:0 0 20px;font-size:13px}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  label{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px}
  button{cursor:pointer;border:0;border-radius:8px;padding:10px 16px;font-size:14px;background:var(--brand);color:#fff}
  button.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  button.sm{padding:5px 10px;font-size:13px}
  button.ok{background:var(--ok)} button.bad{background:var(--bad)} button.warn{background:var(--warn)}
  button:disabled{opacity:.5;cursor:not-allowed}
  /* 布局 */
  #app{display:none;min-height:100vh}
  header{background:var(--bg);color:#fff;display:flex;align-items:center;gap:20px;padding:0 20px;height:56px;position:sticky;top:0;z-index:5}
  header .logo{font-weight:700}
  nav{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  nav a{color:#cbd5e1;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px}
  nav a.active{background:rgba(255,255,255,.14);color:#fff}
  header .user{color:#cbd5e1;font-size:13px}
  main{max-width:1200px;margin:0 auto;padding:24px 20px}
  h2{font-size:18px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  /* 卡片 */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
  .card .k{color:var(--muted);font-size:13px} .card .v{font-size:26px;font-weight:700;margin-top:6px}
  .card .v.small{font-size:15px;font-weight:600}
  .card.clickable{cursor:pointer;transition:.15s}
  .card.clickable:hover{border-color:var(--brand);box-shadow:0 6px 18px rgba(37,99,235,.14);transform:translateY(-2px)}
  .card .k .arrow{float:right;color:var(--brand);font-weight:700}
  .card .cardDesc{color:var(--muted);font-size:12px;margin-top:8px;line-height:1.45}
  .formRow{display:grid;grid-template-columns:200px 1fr;gap:10px 16px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .formRow .fl{font-size:13px} .formRow .fd{color:var(--muted);font-size:12px;margin-top:2px}
  .grpTitle{font-size:15px;font-weight:600;margin:22px 0 6px}
  /* 表格 */
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
  th{background:var(--soft);color:var(--muted);font-weight:600;white-space:nowrap}
  tr:last-child td{border-bottom:0}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .toolbar select{width:auto}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;background:var(--soft);color:#334155}
  .pill.ok{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}
  .pill.bad{background:#fee2e2;color:#991b1b}.pill.info{background:#dbeafe;color:#1e40af}
  .tag{display:inline-block;padding:1px 7px;border-radius:6px;background:#eef2ff;color:#3730a3;font-size:12px;margin:1px}
  /* 抽屉 */
  #drawer{position:fixed;top:0;right:0;width:min(560px,92vw);height:100vh;background:#fff;
          box-shadow:-8px 0 30px rgba(2,6,23,.2);transform:translateX(100%);transition:.25s;overflow:auto;z-index:20;padding:22px}
  #drawer.open{transform:none}
  #drawer h3{margin:0 0 12px}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 12px;font-size:13px;margin:10px 0}
  .kv .lbl{color:var(--muted)}
  .lossbox{border:1px solid var(--line);border-radius:8px;padding:10px;margin:8px 0;font-size:13px}
  .close{position:absolute;top:16px;right:18px;cursor:pointer;color:var(--muted);font-size:22px}
  #mask{position:fixed;inset:0;background:rgba(2,6,23,.35);display:none;z-index:15}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;
         padding:10px 18px;border-radius:8px;opacity:0;transition:.3s;z-index:30;font-size:14px}
  .muted{color:var(--muted)} .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
  .banner{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;padding:10px 14px;border-radius:10px;margin-bottom:16px;font-size:13px}
  pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:8px;overflow:auto;font-size:12px;max-height:340px}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login">
  <h1>国内行业安全事件库</h1>
  <p>管理后台 · 请登录</p>
  <label>用户名</label><input id="u" value="admin" autocomplete="username">
  <label>口令</label><input id="p" type="password" value="ChangeMe!2026" autocomplete="current-password">
  <div style="margin-top:18px"><button onclick="login()" style="width:100%">登录</button></div>
  <p id="loginErr" style="color:var(--bad);margin-top:10px;display:none"></p>
  <p class="muted" style="margin-top:16px;font-size:12px">默认账号 admin / ChangeMe!2026(首次登录后请修改)</p>
</div>

<!-- 主应用 -->
<div id="app">
  <header>
    <span class="logo">🛡️ 安全事件库</span>
    <nav id="nav"></nav>
    <span class="user" id="whoami"></span>
    <button class="sm ghost" onclick="logout()">退出</button>
  </header>
  <main id="view"></main>
</div>

<div id="mask" onclick="closeDrawer()"></div>
<div id="drawer"><span class="close" onclick="closeDrawer()">×</span><div id="drawerBody"></div></div>
<div id="toast"></div>

<script>
const NEED = "sec_events";
let TOKEN = localStorage.getItem("tok") || "";
let ROLE = localStorage.getItem("role") || "";
const TABS = [
  ["dashboard","仪表盘"],["events","事件"],["review","复核台"],
  ["followups","回访"],["leads","销售线索"],["sources","数据源"],["crawl","采集"],["settings","设置"],
];
let PENDING = {};   // 下钻时携带的预设筛选,由目标页读取后清空
function drill(tab, filter){ PENDING = filter || {}; go(tab); }

/* ---------- 通用请求 ---------- */
async function api(path, opts={}){
  opts.headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  if(TOKEN) opts.headers["Authorization"] = "Bearer "+TOKEN;
  const r = await fetch("/api/v1"+path, opts);
  if(r.status===401){ logout(); throw new Error("登录已过期,请重新登录"); }
  const txt = await r.text();
  let data; try{ data = txt?JSON.parse(txt):null; }catch{ data = txt; }
  if(!r.ok) throw new Error((data&&data.detail)?JSON.stringify(data.detail):("HTTP "+r.status));
  return data;
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2600); }
function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

/* ---------- 登录 ---------- */
async function login(){
  const u=document.getElementById("u").value, p=document.getElementById("p").value;
  try{
    const r = await fetch("/api/v1/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:u,password:p})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail||"登录失败");
    TOKEN=d.token; ROLE=d.role; localStorage.setItem("tok",TOKEN); localStorage.setItem("role",ROLE);
    localStorage.setItem("user",u); boot();
  }catch(e){ const el=document.getElementById("loginErr"); el.textContent=e.message; el.style.display="block"; }
}
function logout(){ TOKEN=""; localStorage.clear();
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="block"; }

function boot(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("whoami").textContent = (localStorage.getItem("user")||"")+" · "+ROLE;
  const nav=document.getElementById("nav"); nav.innerHTML="";
  TABS.forEach(([k,label])=>{ const a=document.createElement("a"); a.textContent=label;
    a.dataset.k=k; a.onclick=()=>go(k); nav.appendChild(a); });
  go("dashboard");
}
function go(k){
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active",a.dataset.k===k));
  ({dashboard:vDashboard,events:vEvents,review:vReview,followups:vFollowups,
    leads:vLeads,sources:vSources,crawl:vCrawl,settings:vSettings}[k])();
}

/* ---------- 仪表盘 ---------- */
async function vDashboard(){
  const v=document.getElementById("view");
  v.innerHTML=`<h2>仪表盘</h2>
    <p class="sub">国内行业安全事件库(sec_events)· 每个卡片是一个关键指标,鼠标悬停有说明,点击卡片直接进对应明细页。数据流:采集文档 → 抽取成事件 → 待复核 → 发布 → 生成线索/回访。</p>
    <div id="seedBanner" class="banner">第一次使用、库里还没数据?先点
      <button class="sm" onclick="seedDemo()">一键载入演示数据</button>
      &nbsp;即可在各页面看到事件、线索、复核任务的样子(纯本地样例,不联网)。</div>
    <div class="cards" id="cards">加载中…</div>`;
  try{
    const d=await api(`/kpi/dashboard?need_id=${NEED}`);
    window.__trace = d.traceability;
    const trace = d.traceability.ok
      ? `<span class="pill ok">通过</span>` : `<span class="pill bad">违规 ${d.traceability.violations.length}</span>`;
    // 每张卡片:go=下钻目标 tab,f=预设筛选,click=自定义动作,desc=这个框是什么
    const cards=[
      {k:"事件总数", v:d.events_total, go:"events",
        desc:"库里全部安全事件(草稿+已发布)。点击 → 事件列表(全部)"},
      {k:"已发布", v:d.events_published, go:"events", f:{status:"live"},
        desc:"已复核发布 / 跟踪中的事件,是能用于分析的正式数据。点击 → 事件列表(已发布)"},
      {k:"采集文档", v:d.docs_total, go:"crawl",
        desc:"从各数据源采集入库的原始网页/文章,是事件的原料。点击 → 采集页看文档与采集记录"},
      {k:"待复核", v:d.pending_review, go:"review",
        desc:"已抽取、等人工核对后才能发布的事件。点击 → 复核台处理"},
      {k:"新线索", v:d.leads_new, go:"leads",
        desc:"事件自动匹配出的、待销售跟进的商机。点击 → 线索列表"},
      {k:"完备度均分", v:d.avg_completeness??"-", go:"events",
        desc:"事件字段填充完整度平均分(满分100),越高信息越全。点击 → 事件列表"},
      {k:"回访待办", v:d.followups_open, go:"followups",
        desc:"待回访补全罚款/判决/整改采购等滞后信息的任务。点击 → 回访页"},
      {k:"金额可追溯", v:trace, small:true, click:"trace",
        desc:"红线校验:所有『已确认金额』是否都挂了权威来源(S1/S2)。点击查看详情"},
    ];
    const box=document.getElementById("cards");
    box.innerHTML = cards.map((c,i)=>
      `<div class="card clickable" data-i="${i}" title="${esc(c.desc)}">
         <div class="k">${c.k}<span class="arrow">›</span></div>
         <div class="v ${c.small?'small':''}">${c.v??"-"}</div>
         <div class="cardDesc">${esc(c.desc)}</div></div>`).join("");
    box.querySelectorAll(".card").forEach((el,i)=>{
      const c=cards[i];
      el.onclick = c.click==="trace" ? showTrace : ()=>drill(c.go, c.f);
    });
  }catch(e){ document.getElementById("cards").innerHTML=`<div class="muted">加载失败:${esc(e.message)}</div>`; }
}
function showTrace(){
  const t=window.__trace||{};
  if(t.ok){ toast("金额可追溯:全部已确认金额均有 S1/S2 权威来源支撑 ✓"); return; }
  drawer(`<h3>金额可追溯性违规</h3>
    <p class="muted">以下事件存在“已确认金额”但缺少 S1/S2 权威来源,报表层会拒绝出数,请复核补来源或降级金额通道。</p>
    ${(t.violations||[]).map(v=>`<div class="lossbox"><span class="mono" style="cursor:pointer" onclick="openEvent('${v.event_id}')">${v.event_id}</span> · 字段:${(v.fields||[]).join(", ")}</div>`).join("")}`);
}
async function seedDemo(){
  try{ const r=await api("/demo/seed?need_id="+NEED,{method:"POST"});
    toast(`已载入 ${r.created.length} 条演示事件`); go("dashboard"); }
  catch(e){ toast("失败:"+e.message); }
}

/* ---------- 事件 ---------- */
async function vEvents(){
  const v=document.getElementById("view");
  v.innerHTML=`<h2>事件</h2><p class="sub">采集抽取后的安全事件记录</p>
    <div class="toolbar">
      <select id="fStatus" onchange="loadEvents()">
        <option value="">全部状态</option><option value="draft">草稿</option>
        <option value="live">已发布/跟踪中</option>
        <option value="published">仅已发布</option><option value="monitoring">仅跟踪中</option></select>
      <select id="fSev" onchange="loadEvents()">
        <option value="">全部严重度</option><option>特别重大</option><option>重大</option>
        <option>较大</option><option>一般</option><option>未定级</option></select>
    </div><div id="evTable">加载中…</div>`;
  // 应用仪表盘下钻带来的预设筛选
  if(PENDING.status) document.getElementById("fStatus").value = PENDING.status;
  if(PENDING.severity) document.getElementById("fSev").value = PENDING.severity;
  PENDING = {};
  loadEvents();
}
async function loadEvents(){
  const st=document.getElementById("fStatus").value, sv=document.getElementById("fSev").value;
  let q=`/events?need_id=${NEED}&limit=200`; if(st)q+=`&status=${st}`; if(sv)q+=`&severity=${encodeURIComponent(sv)}`;
  try{
    const rows=await api(q);
    if(!rows.length){ document.getElementById("evTable").innerHTML=`<p class="muted">暂无事件。去「仪表盘」点“一键载入演示数据”,或到「采集」页跑一轮真实采集。</p>`; return; }
    document.getElementById("evTable").innerHTML=`<table><thead><tr>
      <th>标题</th><th>行业</th><th>严重度</th><th>手段</th><th>状态</th><th>完备度</th><th>披露日</th></tr></thead><tbody>`+
      rows.map(e=>`<tr style="cursor:pointer" onclick="openEvent('${e.event_id}')">
        <td>${esc(e.title||e.event_id)}</td><td>${esc(e.industry||"-")}</td>
        <td>${sevPill(e.severity)}</td><td>${(e.attack_types||[]).map(a=>`<span class="tag">${esc(a)}</span>`).join("")}</td>
        <td>${statusPill(e.status)}</td><td>${e.completeness??"-"}</td><td class="muted">${esc(e.disclosed_date||"-")}</td>
      </tr>`).join("")+`</tbody></table>`;
  }catch(e){ document.getElementById("evTable").innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}
function sevPill(s){ const m={"特别重大":"bad","重大":"bad","较大":"warn","一般":"info"};
  return s?`<span class="pill ${m[s]||''}">${esc(s)}</span>`:"-"; }
function statusPill(s){ const m={published:"ok",monitoring:"info",draft:"",closed:""};
  const t={published:"已发布",monitoring:"跟踪中",draft:"草稿",closed:"已关闭"};
  return `<span class="pill ${m[s]||''}">${t[s]||s}</span>`; }

async function openEvent(id){
  try{
    const d=await api(`/events/${id}`); const p=d.payload||{};
    const losses=["loss_L1","loss_L2","loss_L3","loss_L4","loss_L5"];
    const lname={loss_L1:"L1 直接资金",loss_L2:"L2 收入/产量",loss_L3:"L3 处置成本",loss_L4:"L4 罚款诉讼",loss_L5:"L5 商业机会"};
    const money=(m)=>{ if(!m)return"未披露"; const f=(c)=>c?(c.point??c.low??"?"):null;
      const parts=[]; if(f(m.confirmed_cny))parts.push(`<span class="pill ok">已确认 ${f(m.confirmed_cny)}</span>`);
      if(f(m.estimated_cny))parts.push(`<span class="pill info">估算 ${f(m.estimated_cny)}</span>`);
      if(f(m.claimed_cny))parts.push(`<span class="pill warn">声称 ${f(m.claimed_cny)}</span>`);
      return parts.length?parts.join(" "):`<span class="muted">${esc(m.status||"未披露")}</span>`; };
    const r=p.ransom||{};
    drawer(`
      <h3>${esc(p.title||id)}</h3>
      <div class="kv">
        <span class="lbl">事件编号</span><span class="mono">${id} ${statusPill(d.status)}</span>
        <span class="lbl">单位/行业</span><span>${esc(p.org_name||"未披露")} / ${esc((p.industry||{}).level1||"-")}</span>
        <span class="lbl">地区</span><span>${esc((p.region||{}).province||"-")}</span>
        <span class="lbl">严重度</span><span>${sevPill(p.severity&&p.severity.level)}</span>
        <span class="lbl">手段</span><span>${(p.attack_type||[]).map(a=>`<span class="tag">${esc(a)}</span>`).join("")||"-"}</span>
        <span class="lbl">后果</span><span>${(p.consequences||[]).map(a=>`<span class="tag">${esc(a)}</span>`).join("")||"-"}</span>
        <span class="lbl">完备度</span><span>${d.completeness??"-"}</span>
      </div>
      <div class="lossbox"><b>赎金(要求≠损失)</b><br>
        ${r.applicable?`要求:${r.demanded_amount??"?"} ${esc(r.demanded_currency||"")} · 是否支付:${esc(r.paid||"未披露")}`:'<span class="muted">非勒索事件</span>'}
      </div>
      <b style="font-size:13px">损失六分类</b>
      ${losses.map(k=>`<div class="lossbox"><b>${lname[k]}</b><br>${money(p[k])}</div>`).join("")}
      <b style="font-size:13px">可售产品映射</b>
      <div style="margin:6px 0">${(p.sellable_mapping||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join("")||'<span class="muted">无</span>'}</div>
      <b style="font-size:13px">来源</b>
      <div style="margin:6px 0">${(p.sources||[]).map(s=>`<div class="muted mono">[${esc(s.credibility)}] ${esc(s.url_or_doc_number||s.publisher||"")}</div>`).join("")||'<span class="muted">无</span>'}</div>
      <details style="margin-top:10px"><summary class="muted">查看完整 JSON</summary><pre>${esc(JSON.stringify(p,null,2))}</pre></details>
    `);
  }catch(e){ toast(e.message); }
}

/* ---------- 复核台 ---------- */
async function vReview(){
  const v=document.getElementById("view");
  const canReview = ["reviewer","admin"].includes(ROLE);
  v.innerHTML=`<h2>复核台</h2><p class="sub">抽取后的事件需复核后才能发布;含已确认金额的需双人复核</p>
    <div class="toolbar">
      <select id="rStage" onchange="loadReview()">
        <option value="pending">待复核(全部)</option>
        <option value="extracted">新抽取</option>
        <option value="first_review">待一审</option><option value="second_review">待二审(金额双签)</option></select>
      ${canReview?"":'<span class="pill warn">当前角色无复核权限,仅查看</span>'}
    </div><div id="rvTable">加载中…</div>`;
  loadReview();
}
async function loadReview(){
  const stage=document.getElementById("rStage").value;
  const canReview=["reviewer","admin"].includes(ROLE);
  try{
    const rows=await api(`/review/queue?stage=${stage}`);
    if(!rows.length){ document.getElementById("rvTable").innerHTML=`<p class="muted">该阶段暂无待办。新事件默认在「新抽取」,提交后进入「待一审」。</p>`; return; }
    document.getElementById("rvTable").innerHTML=`<table><thead><tr>
      <th>事件</th><th>阶段</th><th>金额双签</th><th>操作</th></tr></thead><tbody>`+
      rows.map(t=>`<tr>
        <td style="cursor:pointer" onclick="openEvent('${t.event_id}')"><span class="mono">${t.event_id}</span></td>
        <td>${stageLabel(t.stage)}</td><td>${t.needs_double?'<span class="pill warn">需双签</span>':'<span class="pill">否</span>'}</td>
        <td>
          ${canReview?`<button class="sm ok" onclick="rvAct('${t.event_id}','approve')">通过</button>
            <button class="sm bad" onclick="rvReject('${t.event_id}')">驳回</button>`
          : t.stage==="extracted"?`<button class="sm" onclick="rvAct('${t.event_id}','submit')">提交复核</button>`:""}
        </td></tr>`).join("")+`</tbody></table>`;
  }catch(e){ document.getElementById("rvTable").innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}
function stageLabel(s){ return {extracted:"新抽取",first_review:"待一审",second_review:"待二审",
  published:"已发布",rejected:"已驳回"}[s]||s; }
async function rvAct(id,act){
  try{ await api(`/review/${id}/${act}`,{method:"POST"});
    toast(act==="approve"?"已通过":"已提交"); loadReview(); }
  catch(e){ toast("失败:"+e.message); }
}
async function rvReject(id){
  const reason=prompt("驳回原因:"); if(!reason)return;
  try{ await api(`/review/${id}/reject`,{method:"POST",body:JSON.stringify({reason})});
    toast("已驳回"); loadReview(); }catch(e){ toast("失败:"+e.message); }
}

/* ---------- 回访 ---------- */
async function vFollowups(){
  const v=document.getElementById("view");
  v.innerHTML=`<h2>回访</h2><p class="sub">罚款、判决、整改采购等滞后信息,按 T+30/90/180/365 到期回访补全</p>
    <div id="fuTable">加载中…</div>`;
  try{
    const rows=await api("/followups?due=2099-12-31");   // 拉全部未完成回访(含未来到期)
    if(!rows.length){ document.getElementById("fuTable").innerHTML=`<p class="muted">暂无回访任务。事件发布且存在未落地字段(金额/采购/赎金等)时自动生成。</p>`; return; }
    document.getElementById("fuTable").innerHTML=`<table><thead><tr>
      <th>事件</th><th>类型</th><th>到期日</th><th>回访原因</th><th>一键检索</th></tr></thead><tbody>`+
      rows.map(t=>`<tr>
        <td class="mono" style="cursor:pointer" onclick="openEvent('${t.event_id}')">${t.event_id}</td>
        <td><span class="pill info">${esc(t.kind)}</span></td>
        <td class="muted">${esc(t.due)}</td>
        <td class="muted" style="max-width:360px">${esc(t.reason||"")}</td>
        <td><button class="sm ghost" onclick="showPack(${t.id})">检索链接</button></td>
      </tr>`).join("")+`</tbody></table>`;
  }catch(e){ document.getElementById("fuTable").innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}
async function showPack(id){
  try{
    const p=await api(`/followups/${id}/search-pack`);
    if(p.note){ drawer(`<h3>一键检索包</h3><p class="muted">${esc(p.note)}</p>`); return; }
    drawer(`<h3>一键检索包</h3>
      <p class="muted">用单位名在权威渠道定向核查处罚/判决/中标,补全滞后字段。</p>
      <b style="font-size:13px">检索词</b>
      <div style="margin:6px 0">${(p.queries||[]).map(q=>`<span class="tag">${esc(q)}</span>`).join("")}</div>
      <b style="font-size:13px">直达链接</b>
      ${Object.entries(p.links||{}).map(([k,u])=>`<div class="lossbox"><a href="${esc(u)}" target="_blank">${esc(k)} ↗</a></div>`).join("")}`);
  }catch(e){ toast(e.message); }
}

/* ---------- 线索 ---------- */

  v.innerHTML=`<h2>销售线索</h2><p class="sub">事件→产品映射与评分,按采购窗口分阶段</p><div id="ldTable">加载中…</div>`;

      <th>目标单位</th><th>评分</th><th>采购窗口</th><th>建议产品</th><th>话术依据</th></tr></thead><tbody>`+

        <td>${esc(l.target_org)}</td><td><b>${l.score}</b></td>

/* ---------- 数据源 ---------- */
async function vSources(){
  const v=document.getElementById("view");

    const rows=await api(`/sources`);
    document.getElementById("srcTable").innerHTML=`<table><thead><tr>
      <th>名称</th><th>类型</th><th>可信度</th><th>频率</th><th>状态</th><th>半自动</th><th>文档数</th></tr></thead><tbody>`+
      rows.map(s=>`<tr>
        <td>${esc(s.name)}</td><td>${s.kind==="query"?"检索型":"页面型"}</td>

/* ---------- 采集 ---------- */
async function vCrawl(){
  const v=document.getElementById("view");
  const canRun=["analyst","editor","admin"].includes(ROLE);
  v.innerHTML=`<h2>采集</h2><p class="sub">手动触发一轮采集(真实访问互联网),并查看执行记录与错误</p>
    <div class="banner">⚠️ 点击“开始采集”会真实访问网站。部分源需人工辅助或有反爬,失败会记录在下方错误报告中,属正常现象。</div>
    <div class="toolbar">
      <label style="margin:0">源数量上限</label>
      <select id="cLimit"><option>3</option><option>5</option><option>10</option></select>
      ${canRun?`<button onclick="runCrawl()" id="runBtn">开始采集</button>`:'<span class="pill warn">当前角色无采集权限</span>'}
      <button class="ghost sm" onclick="loadRuns()">刷新记录</button>
    </div>
    <div id="crawlOut"></div>
    <h3 style="font-size:15px;margin-top:20px">采集到的文档</h3>
    <p class="sub">采集/演示入库的原始文档(粗筛后进入抽取)</p>
    <div id="docsTable">加载中…</div>
    <h3 style="font-size:15px;margin-top:20px">最近采集记录 / 错误报告</h3>
    <div id="runsTable">加载中…</div>`;
  loadDocs(); loadRuns();
}
async function loadDocs(){
  try{
    const rows=await api(`/documents?need_id=${NEED}&limit=500`);
    if(!rows.length){ document.getElementById("docsTable").innerHTML=`<p class="muted">暂无文档。上方“开始采集”跑一轮,或到仪表盘点“一键载入演示数据”。</p>`; return; }
    document.getElementById("docsTable").innerHTML=`<table><thead><tr>
      <th>标题</th><th>来源</th><th>粗筛</th><th>首发/转载</th></tr></thead><tbody>`+
      rows.map(d=>`<tr>
        <td>${esc(d.title||d.url)}</td><td class="muted">${esc(d.publisher||"")}</td>
        <td>${screenPill(d.screen_status)}</td>
        <td>${d.is_primary?'<span class="pill">首发</span>':'<span class="pill warn">转载</span>'}</td>
      </tr>`).join("")+`</tbody></table>`;
  }catch(e){ document.getElementById("docsTable").innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}
function screenPill(s){ const m={screened_in:["ok","已入选"],screened_out:["","已过滤"],
  manual_queue:["warn","待人工"],pending:["info","待粗筛"]}; const x=m[s]||["",s];
  return `<span class="pill ${x[0]}">${x[1]}</span>`; }
async function runCrawl(){
  const btn=document.getElementById("runBtn"); btn.disabled=true; btn.textContent="采集中…(可能需数十秒)";
  const limit=parseInt(document.getElementById("cLimit").value);
  try{
    const r=await api("/crawl/run",{method:"POST",body:JSON.stringify({need_id:NEED,limit_sources:limit})});
    document.getElementById("crawlOut").innerHTML=`<div class="lossbox">
      本轮采集源 <b>${r.sources}</b> 个,处理文档 <b>${(r.processed||[]).length}</b> 条,
      候选新源 <b>${(r.candidates||[]).length}</b> 个,刷新线索 <b>${r.leads_refreshed}</b>。
      ${(r.processed||[]).filter(p=>p.action==="draft_created").length} 条生成草稿事件。</div>`;
    toast("采集完成"); loadDocs(); loadRuns();
  }catch(e){ document.getElementById("crawlOut").innerHTML=`<p class="pill bad">采集失败:${esc(e.message)}</p>`; }
  finally{ btn.disabled=false; btn.textContent="开始采集"; }
}
async function loadRuns(){
  try{
    const rows=await api("/crawl/runs?limit=40");
    if(!rows.length){ document.getElementById("runsTable").innerHTML=`<p class="muted">尚无采集记录。</p>`; return; }
    document.getElementById("runsTable").innerHTML=`<table><thead><tr>
      <th>源</th><th>状态</th><th>发现</th><th>新增</th><th>错误</th><th>时间</th></tr></thead><tbody>`+
      rows.map(r=>`<tr>
        <td>${esc(r.source)}</td>
        <td>${r.status==="ok"?'<span class="pill ok">成功</span>':r.status==="failed"?'<span class="pill bad">失败</span>':'<span class="pill warn">部分</span>'}</td>
        <td>${r.found}</td><td>${r.new}</td>
        <td class="muted" style="max-width:280px">${esc(r.error||"")}</td>
        <td class="muted">${esc((r.started_at||"").replace("T"," ").slice(0,16))}</td>
      </tr>`).join("")+`</tbody></table>`;
  }catch(e){ document.getElementById("runsTable").innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}

/* ---------- 设置 ---------- */
async function vSettings(){
  const v=document.getElementById("view");
  const isAdmin = ROLE==="admin";
  v.innerHTML=`<h2>设置</h2>
    <p class="sub">配置大模型接口、采集、去重、存档参数。${isAdmin?'保存后即时生效(无需重启)。':'当前角色只读,仅 admin 可修改。'}</p>
    <div class="banner">💡 用真实大模型:把「LLM 模式」改成 openai_compat,填接口地址/密钥/模型名(国内可用 Qwen、DeepSeek);
      想离线测试就保持 mock。密钥留空表示不改动已保存的值。数据库地址、登录密钥等结构性配置仍在项目根 .env 中,改动需重启。</div>
    <div id="setForm">加载中…</div>
    ${isAdmin?`<div style="margin-top:18px"><button onclick="saveSettings()">保存配置</button>
      <span id="setMsg" class="muted" style="margin-left:12px"></span></div>`:""}`;
  try{
    const cfg=await api("/settings");
    document.getElementById("setForm").innerHTML = cfg.groups.map(g=>`
      <div class="grpTitle">${esc(g.name)}</div>
      ${g.fields.map(f=>settingRow(f,isAdmin)).join("")}`).join("");
  }catch(e){ document.getElementById("setForm").innerHTML=`<p class="muted">${esc(e.message)}</p>`; }
}
function settingRow(f,editable){
  const id="set_"+f.key;
  let input;
  if(!editable){
    input=`<span class="mono">${f.type==="bool"?(f.value?"开":"关"):esc(f.value||"(空)")}</span>`;
  }else if(f.type==="bool"){
    input=`<select id="${id}"><option value="true"${f.value?" selected":""}>开启</option>
      <option value="false"${!f.value?" selected":""}>关闭</option></select>`;
  }else if(f.type.startsWith("enum:")){
    const opts=f.type.slice(5).split(",");
    input=`<select id="${id}">${opts.map(o=>`<option${o===f.value?" selected":""}>${o}</option>`).join("")}</select>`;
  }else{
    const ph=f.secret?"已配置,留空不修改":"";
    const val=f.secret?"":esc(f.value??"");
    input=`<input id="${id}" value="${val}" placeholder="${ph}" ${f.secret?'type="password"':''}>`;
  }
  return `<div class="formRow"><div><div class="fl">${esc(f.label)}</div><div class="fd">${esc(f.desc||"")}</div></div>
    <div>${input}</div></div>`;
}
async function saveSettings(){
  const cfg=await api("/settings");
  const body={};
  cfg.groups.forEach(g=>g.fields.forEach(f=>{
    const el=document.getElementById("set_"+f.key); if(!el) return;
    // 密钥留空则不提交(不覆盖已存值)
    if(f.secret && !el.value) return;
    body[f.key]=el.value;
  }));
  try{
    const r=await api("/settings",{method:"PUT",body:JSON.stringify(body)});
    document.getElementById("setMsg").textContent="已保存并生效:"+(r.applied||[]).join("、");
    toast("配置已保存");
  }catch(e){ document.getElementById("setMsg").textContent="失败:"+e.message; }
}

/* ---------- 抽屉 ---------- */
function drawer(html){ document.getElementById("drawerBody").innerHTML=html;
  document.getElementById("drawer").classList.add("open"); document.getElementById("mask").style.display="block"; }
function closeDrawer(){ document.getElementById("drawer").classList.remove("open");
  document.getElementById("mask").style.display="none"; }

/* ---------- 启动 ---------- */
if(TOKEN) boot();
document.getElementById("p").addEventListener("keydown",e=>{ if(e.key==="Enter")login(); });
</script>
