# 标准词表 v1.0 —— 事件库枚举值的唯一权威来源
# 变更需评审并升版本号,否则历史统计口径漂移(见方案第 11 节)

version: "1.0"

industries:            # 一级行业 → 二级细分(可扩充)
  金融: [国有大行, 股份制银行, 城商行农商行, 证券, 保险, 基金, 消费金融, 支付机构, 其他金融]
  医疗卫生: [三甲医院, 其他医院, 公卫机构, 医药企业, 医疗器械, 医疗信息化]
  制造业: [汽车, 电子, 装备制造, 化工, 钢铁有色, 轻工消费品, 其他制造]
  能源: [电力, 石油石化, 燃气, 煤炭, 新能源]
  政务: [中央部委, 省级政府, 市县政府, 公共事业平台]
  教育: [高校, 中小学, 教育机构, 在线教育]
  交通物流: [航空, 铁路, 公路客运, 港口航运, 城市交通, 快递物流]
  互联网: [电商, 社交内容, 游戏, 出行本地生活, SaaS软件, 其他互联网]
  电信运营: [基础运营商, 增值电信, IDC云服务]
  零售消费: [连锁零售, 餐饮酒店, 品牌消费]
  建筑地产: [建筑施工, 房地产, 物业]
  农业: [农业生产, 农产品加工]
  其他: []

org_types: [央企, 地方国企, 上市公司, 民营企业, 外资在华, 政府机关, 事业单位, 医院, 学校, 社会组织, 其他]

org_tags:              # 单位补充属性,多选,与 org_type 组合使用(一个单位可同时具备多项)
  [关键信息基础设施运营者, 等保三级及以上备案, 央企集团成员, 上市公司或拟上市,
   专精特新, 持牌金融机构, 数据出境业务, 未知]

severity_levels:       # 事件整体严重度(参照《国家网络安全事件应急预案》分级口径,内部定级)
  特别重大: 关基长时间中断/影响用户≥1亿或泄露≥1亿条/确认损失≥1亿元/严重公共安全影响
  重大: 重要系统中断≥24h/影响用户≥1000万或泄露≥1000万条/确认损失≥1000万元/明显公共影响
  较大: 业务中断≥4h/影响用户≥100万或泄露≥100万条/确认损失≥100万元
  一般: 未达上述阈值的其他入库事件
  未定级: 信息不足,待回访后定级
  # 规则:按已确认口径就高定级;仅有声称/估算时按下一档并标注;人工可覆盖自动建议

consequences:          # 事件后果(与 attack_types 的"手段"维度正交,多选)
  [数据泄露, 数据被加密或破坏, 业务中断, 资金直接损失, 服务降级,
   数据被篡改, 被用作跳板攻击他人, 声誉影响, 无明显后果, 未披露]

affected_systems:
  [核心生产系统, ERP, OA办公, 官网门户, 移动APP或小程序, 数据库, 大数据平台,
   工控SCADA/DCS, 云上资源, 支付交易系统, CRM会员系统, 邮件系统, 域控与内网,
   物流仓储系统, 医疗HIS/LIS/PACS, 教务系统, 呼叫中心, 未披露]

attack_types:          # "手段"维度;后果用 consequences 单独记录,两维正交统计
  # 手段未知、仅知数据流出时选"数据泄露(渠道未明)";"监管处罚事件"用于
  # 未披露技术细节、仅有处罚信息的事件(此时后果按处罚文书内容填写)
  [勒索软件, 数据泄露(渠道未明), 内部人员违规, 网页篡改挂马, DDoS, 业务欺诈,
   供应链攻击, 钓鱼与BEC, APT定向攻击, 工控物联网攻击, 云配置错误暴露,
   漏洞被利用, 账号接管, 挖矿木马, 监管处罚事件, 其他]

entry_vectors:
  [钓鱼邮件, VPN或边界设备漏洞, 弱口令与暴力破解, 未修补已知漏洞, 0day漏洞,
   供应链或第三方, 内部人员, 云配置错误, 凭据泄露复用, 物理接触, 社会工程,
   外包运维通道, 未知]

root_causes:
  管理类: [无有效备份, 补丁管理缺失, 权限管控失效, 外包与第三方失管, 无应急预案, 安全投入不足, 日志与监控缺失]
  技术类: [0day利用, 架构缺陷, 配置错误, 老旧系统无法升级]
  人为类: [员工误操作, 内鬼作案, 被社工欺骗]
  未披露: []

data_types:
  [姓名, 身份证号, 手机号, 住址, 银行卡与支付信息, 征信信息, 病历与健康数据,
   生物特征, 未成年人信息, 车辆与轨迹, 企业经营数据, 源代码与知识产权,
   涉密或敏感业务数据, 未披露]

security_controls:     # 事发时安全控制状态(B9)的控制类别;状态取值:缺位/在位但失效/在位被绕过/不明
  [数据备份, 灾备切换能力, EDR终端防护, 边界防火墙, WAF, 邮件安全网关, MFA多因素认证,
   特权账号管理, 网络分段隔离, 日志审计留存, SOC安全监控, 漏洞与补丁管理, DLP,
   数据库审计, 供应商安全管理, 员工安全意识, 应急预案与演练, 整体不明]

procurement_categories:   # 事故后整改采购品类(回访招标网站时的检索标签)
  [EDR终端防护, 备份与恢复, 灾备建设, 防火墙与边界防护, 态势感知SOC, 日志审计,
   数据库审计, DLP数据防泄露, 零信任与身份治理, 漏洞管理与渗透测试, 攻击面管理,
   邮件安全, 安全意识培训, 等保测评与合规咨询, 密评改造, 工控安全, 云安全,
   MSS托管安全服务, 应急响应服务, 网络安全保险, 其他]

sellable_products:        # 需按公司实际产品线校准后冻结
  [备份与恢复, 灾备方案, EDR, NDR, 勒索评估服务, 应急响应服务, 数据库审计,
   DLP, 零信任权限治理, 数据分类分级服务, 邮件安全网关, 安全意识培训, MFA,
   攻击面管理, 漏洞管理, 渗透测试, SASE, 软件供应链安全SBOM, 供应商安全评估,
   CSPM云安全, 云安全托管, 工控安全审计, OT网络监测, 等保辅导, 个保合规咨询,
   密评, MSS托管服务, 安全保险经纪合作]

legal_bases:           # 处罚/判决依据的规范化编码(regulatory_actions.legal_basis_code),
                       # 具体条款号仍记在 legal_basis 自由文本;用于聚合"哪部法在驱动罚款"
  [网络安全法, 数据安全法, 个人信息保护法, 关键信息基础设施安全保护条例,
   网络数据安全管理条例, 计算机信息系统安全保护条例, 等级保护相关规定,
   密码法及商用密码管理条例, App个人信息收集使用相关规定,
   金融监管规章(人行/金融监管总局/证监会), 电信和互联网行业规定(工信),
   行业主管部门其他规章, 治安管理处罚法, 刑法(注明罪名), 民法典(侵权/合同), 其他]

source_credibility:
  S1: 监管处罚/司法文书/官方通报/上市公司公告 —— 可支撑"已确认"金额
  S2: 企业自披露(官网/公众号/年报)—— 支出类金额可入"已确认"并标注
  S3: 主流媒体/安全媒体/厂商研究报告 —— 支撑事实与"估算"通道
  S4: 社媒爆料/泄露站列名/黑产论坛元数据 —— 仅作线索,需佐证,单源事件入"待证池"
