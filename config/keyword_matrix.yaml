# 关键词矩阵 v0.1 —— 查询型源的每日定题检索(方案 9.3②)
# 组合方式: (事件词 × 时间限定) ∪ (事件词 × 行业词) ∪ (后果词 × 单位词)
# 每源每日查询预算 query_budget 控制配额,命中率低的组合月度评审淘汰

version: "0.1"
time_filters: [近24小时, 近7天]        # 适配器映射为各平台的时间参数
query_budget_per_source_daily: 60

event_terms:                # 核心事件词
  [勒索病毒, 勒索软件, 数据泄露, 信息泄露, 被黑客攻击, 网络攻击, 系统瘫痪,
   系统故障停机, 删库, 内鬼 数据, 倒卖个人信息, 网站被篡改, 遭受DDoS,
   补天 漏洞 泄露, 供应链攻击, 钓鱼邮件 被骗, 电信网络诈骗 企业账户]

consequence_terms:          # 后果/处置词(常出现在通报与判决中)
  [网络安全法 处罚, 数据安全法 罚款, 个人信息保护法 处罚, 等级保护 未履行 罚,
   责令改正 网络安全, 网信办 约谈, 通报批评 数据, 停业整顿 网络安全,
   判决 侵犯公民个人信息, 判决 非法获取计算机信息系统数据, 赔偿 数据泄露]

industry_terms:             # 行业词(与事件词交叉)
  [银行, 城商行, 农商行, 证券, 保险, 基金, 医院, 三甲医院, 药企,
   汽车 车企, 芯片 半导体, 制造 工厂, 电力 电网, 石油 石化, 燃气,
   政务 政府, 高校 大学, 中小学, 航空, 港口, 物流 快递, 电商,
   游戏公司, 运营商, 酒店, 连锁超市, 地产 物业]

org_terms:                  # 单位类型词(与后果词交叉)
  [上市公司, 央企, 国企, 集团公司, 股份有限公司]

procurement_terms:          # M6 回访/招标检索专用(与单位名拼接,不进日常矩阵)
  [安全服务 中标, 网络安全 采购, 数据安全 招标, 等保 测评 中标, 灾备 建设 中标,
   安全运营 托管 中标, 应急响应 采购]

negative_terms:             # 排除词(降噪)
  [招聘, 股票分析, 课程 培训班, 软件下载, 攻略, 演习 演练 通知]
