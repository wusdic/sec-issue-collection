# 关键词矩阵 v0.1 —— 查询型源的每日定题检索(方案 9.3②)
# 组合方式: (事件词 × 时间限定) ∪ (事件词 × 行业词) ∪ (后果词 × 单位词)
# 每源每日查询预算 query_budget 控制配额,命中率低的组合月度评审淘汰

version: "0.2"
time_filters: [近24小时, 近7天]        # 适配器映射为各平台的时间参数
query_budget_per_source_daily: 400    # 每源每次查询条数上限(页面可调; 越大覆盖越全但越慢、反爬风险越高)
max_pages_per_query: 3                # C2: 每个查询翻几页搜索结果; 命中饱和时记录截断, 禁止无声截断
# 交叉组合取词深度(控制事件×行业、后果×单位 组合规模)。放大以覆盖更全,避免"限太死漏采"
cross_event_terms: 20
cross_industry_terms: 34
cross_consequence_terms: 18
cross_org_terms: 8

event_terms:                # 核心事件词(尽量含同义/口语/英文缩写变体,提高召回)
  [勒索病毒, 勒索软件, 勒索攻击, 遭勒索, 中招勒索, 数据泄露, 信息泄露, 数据被泄露,
   用户信息泄露, 客户数据泄露, 个人信息泄露, 数据库泄露, 源代码泄露, 数据外泄,
   被黑客攻击, 遭黑客入侵, 遭网络攻击, 网络攻击, 遭入侵, 服务器被入侵, 被拖库,
   撞库攻击, 系统瘫痪, 业务系统瘫痪, 系统故障停机, 服务器宕机, 官网无法访问,
   删库, 内鬼 数据, 员工 倒卖 数据, 倒卖个人信息, 非法获取 数据, 网站被篡改,
   页面被挂马, 遭受DDoS, DDoS攻击, 流量攻击, 补天 漏洞 泄露, 0day 在野利用,
   供应链攻击, 第三方 泄露, 钓鱼邮件 被骗, 商业邮件诈骗, 电信网络诈骗 企业账户,
   数据勒索, 双重勒索, APT 攻击, 挖矿木马, 后门 植入, 越权访问 数据,
   API 泄露, 云存储 桶 泄露, 配置错误 泄露, 暗网 兜售 数据, 暗网 出售]

consequence_terms:          # 后果/处置词(常出现在通报与判决中)
  [网络安全法 处罚, 数据安全法 罚款, 个人信息保护法 处罚, 个保法 罚款,
   等级保护 未履行 罚, 未尽 安全保护义务, 责令改正 网络安全, 网信办 约谈,
   网信办 处罚, 通报批评 数据, 停业整顿 网络安全, 下架 App 违规收集,
   工信部 通报 违规, 侵犯公民个人信息 判决, 判决 非法获取计算机信息系统数据,
   破坏计算机信息系统 判决, 赔偿 数据泄露, 集体诉讼 数据, 监管 立案 调查,
   行政处罚 数据安全, 罚款 网络安全, 吊销 许可 数据]

industry_terms:             # 行业词(与事件词交叉)
  [银行, 城商行, 农商行, 村镇银行, 证券, 券商, 保险, 保险公司, 基金, 支付机构,
   第三方支付, 消费金融, 小贷, 医院, 三甲医院, 妇幼保健院, 疾控, 药企, 医药,
   生物医药, 汽车 车企, 新能源车, 芯片 半导体, 集成电路, 制造 工厂, 智能制造,
   电力 电网, 发电, 石油 石化, 化工, 燃气, 水务, 政务 政府, 事业单位, 高校 大学,
   科研院所, 中小学 教育, 在线教育, 航空 航司, 机场, 铁路, 港口, 航运, 物流 快递,
   电商 平台, 零售, 连锁超市, 生鲜, 游戏公司, 直播 平台, 社交 App, 运营商, 通信,
   酒店 集团, 旅游 OTA, 地产 物业, 建筑, 餐饮 连锁, SaaS 服务商, 数据中心 IDC,
   云服务商, 快递 驿站]

org_terms:                  # 单位类型词(与后果词交叉)
  [上市公司, 科创板 公司, 央企, 国企, 地方国企, 集团公司, 股份有限公司,
   有限责任公司, 独角兽 企业, 平台企业, 关键信息基础设施 运营者]

procurement_terms:          # M6 回访/招标检索专用(与单位名拼接,不进日常矩阵)
  [安全服务 中标, 网络安全 采购, 数据安全 招标, 等保 测评 中标, 灾备 建设 中标,
   安全运营 托管 中标, 应急响应 采购]

english_terms:              # 仅作用于境外源(Ransomware.live/DataBreaches 等), 中文矩阵搜不到涉华英文报道
  [China ransomware attack, Chinese company data breach, China data leak,
   Chinese hospital cyberattack, China manufacturer hacked, Chinese bank breach,
   China industrial cyberattack, Chinese firm extortion]

negative_terms:             # 排除词(降噪)
  [招聘, 股票分析, 课程 培训班, 软件下载, 攻略, 演习 演练 通知]
